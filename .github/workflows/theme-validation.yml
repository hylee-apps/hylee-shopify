name: Theme Check

# Only runs when Liquid theme files are touched — skipped on pure Hydrogen commits.
on:
  push:
    branches: [main, develop, 'feature/**']
    paths:
      - 'theme/**'
  pull_request:
    branches: [main, develop]
    paths:
      - 'theme/**'

jobs:
  theme-check:
    name: Shopify Theme Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # dotenv-cli requires .env.local to exist even if empty
      - name: Create env file
        run: touch .env.local

      - name: Run Shopify theme check
        run: pnpm theme-check
