name: Storefront 1000096439
on:
  push:
    branches: [main]

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    name: Deploy to Oxygen
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # shopify hydrogen deploy looks for a lockfile inside hydrogen/.
      # Copy the workspace root lockfile in before deploying.
      - name: Copy lockfile into hydrogen workspace
        run: cp pnpm-lock.yaml hydrogen/pnpm-lock.yaml

      - name: Build and Deploy to Oxygen
        # --force skips the uncommitted-changes check; files like
        # .github/copilot-instructions.md are modified during build/codegen.
        run: pnpm --dir hydrogen run deploy -- --force
        env:
          SHOPIFY_HYDROGEN_DEPLOYMENT_TOKEN: ${{ secrets.OXYGEN_DEPLOYMENT_TOKEN_1000096439 }}
