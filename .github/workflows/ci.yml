name: CI

on:
  push:
    branches: [main, develop, 'feature/**']
  pull_request:
    branches: [main, develop]

jobs:
  # ── 1. Formatting ────────────────────────────────────────────────────────────
  format:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check formatting (theme + hydrogen)
        run: pnpm format:check

  # ── 2. Linting ───────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint Hydrogen
        run: pnpm lint

  # ── 3. Type checking ─────────────────────────────────────────────────────────
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Storefront API types
        run: pnpm --dir hydrogen codegen

      - name: Type check Hydrogen
        run: pnpm typecheck

  # ── 4. Build ─────────────────────────────────────────────────────────────────
  # Runs after typecheck — no point building if types are broken.
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [typecheck]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # shopify hydrogen build looks for a lockfile in the hydrogen/ dir.
      # Since this is a pnpm workspace the lockfile lives at the root,
      # so we copy it in before building.
      - name: Copy lockfile into hydrogen workspace
        run: cp pnpm-lock.yaml hydrogen/pnpm-lock.yaml

      - name: Build Hydrogen
        run: pnpm build

  # ── Gate ─────────────────────────────────────────────────────────────────────
  # Single required status check to configure in GitHub branch protection:
  #   Settings → Branches → main → Require status checks → "CI / All Checks Passed"
  all-checks:
    name: All Checks Passed
    runs-on: ubuntu-latest
    needs: [format, lint, typecheck, build]
    steps:
      - run: echo "✓ format, lint, typecheck, and build all passed"
